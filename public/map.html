    <title>Bản đồ Sóc Sơn - Đích đến số 3 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #f1f5f9;
            --paper: #ffffff;
            --ink: #0f172a;
            --muted: #475569;
            --border: rgba(15,23,42,.10);
            --emerald: #059669;
            --emerald2: #10b981;
            --blue: #2563eb;
            --shadow: 0 24px 80px rgba(0,0,0,.18);
            --asphalt: #475569; 
            --gold: #fbbf24;
            --red-luck: #ef4444;
        }
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: var(--bg); 
            color: var(--ink); 
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
        }
        
        header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
            position: relative;
        }
        .brand h1 { margin: 0; font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        .brand p { margin: 0; font-size: 12px; color: var(--muted); }

        #viewport {
            position: relative;
            width: 100vw;
            height: calc(100vh - 70px);
            overflow: hidden;
            cursor: grab;
            background-color: #cbd5e1;
        }
        #viewport:active { cursor: grabbing; }
        #stage {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            background: white;
            box-shadow: var(--shadow);
            border-radius: 12px;
            border: 4px solid white;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.05); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.1; }
        }
        .animate-pulse-target { animation: pulse-ring 2.5s infinite ease-in-out; }

        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; gap: 10px; padding: 10px; }
            .brand p { display: none; }
            .actions { width: 100%; justify-content: flex-start !important; overflow-x: auto; }
        }
    </style>
</head>

    <script>
        const viewport = document.getElementById('viewport');
        const stage = document.getElementById('stage');
        const svg = document.getElementById('mapSvg');
        const btnExport = document.getElementById('btnExport');

        const MAP_W = 3000;
        const MAP_H = 2000;
        
        let state = { x: 0, y: 0, scale: 0.35, dragging: false, lastX: 0, lastY: 0 };
        
        // Touch logic
        let touchStartDist = 0;
        let touchStartScale = 1;
        let lastTapTime = 0;

        function getTouchDist(e) {
            if (e.touches.length < 2) return 0;
            return Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }

        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                const now = Date.now();
                if (now - lastTapTime < 300) { handleDoubleTap(e.touches[0]); }
                lastTapTime = now;
                state.dragging = true;
                state.lastX = e.touches[0].clientX;
                state.lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                state.dragging = false;
                touchStartDist = getTouchDist(e);
                touchStartScale = state.scale;
            }
        }, { passive: true });

        viewport.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && state.dragging) {
                state.x += e.touches[0].clientX - state.lastX;
                state.y += e.touches[0].clientY - state.lastY;
                state.lastX = e.touches[0].clientX;
                state.lastY = e.touches[0].clientY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const dist = getTouchDist(e);
                if (dist === 0) return;
                const factor = dist / touchStartDist;
                const newScale = Math.max(0.05, Math.min(touchStartScale * factor, 4));
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const rect = viewport.getBoundingClientRect();
                const mX = midX - rect.left;
                const mY = midY - rect.top;
                state.x = mX - (mX - state.x) * (newScale / state.scale);
                state.y = mY - (mY - state.y) * (newScale / state.scale);
                state.scale = newScale;
                updateTransform();
            }
        }, { passive: true });

        viewport.addEventListener('touchend', () => { state.dragging = false; }, { passive: true });

        function handleDoubleTap(touch) {
            const rect = viewport.getBoundingClientRect();
            const mX = touch.clientX - rect.left;
            const mY = touch.clientY - rect.top;
            const newScale = Math.min(state.scale * 2, 4);
            state.x = mX - (mX - state.x) * (newScale / state.scale);
            state.y = mY - (mY - state.y) * (newScale / state.scale);
            state.scale = newScale;
            updateTransform();
        }

        // Mouse logic
        viewport.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            state.dragging = true;
            state.lastX = e.clientX;
            state.lastY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!state.dragging) return;
            state.x += e.clientX - state.lastX;
            state.y += e.clientY - state.lastY;
            state.lastX = e.clientX;
            state.lastY = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => state.dragging = false);

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.1 : 0.9;
            const newScale = Math.max(0.05, Math.min(state.scale * factor, 4));
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            state.x = mouseX - (mouseX - state.x) * (newScale / state.scale);
            state.y = mouseY - (mouseY - state.y) * (newScale / state.scale);
            state.scale = newScale;
            updateTransform();
        }, { passive: false });

        function autoFit() {
            const vRect = viewport.getBoundingClientRect();
            const scale = Math.min(vRect.width / MAP_W, vRect.height / MAP_H) * 0.95;
            state.scale = scale;
            state.x = (vRect.width - MAP_W * scale) / 2;
            state.y = (vRect.height - MAP_H * scale) / 2;
            updateTransform();
        }

        function updateTransform() {
            stage.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
        }

        btnExport.addEventListener('click', () => {
            const originalHTML = btnExport.innerHTML;
            btnExport.innerHTML = "Đang xuất ảnh...";
            const svgData = new XMLSerializer().serializeToString(svg);
            const canvas = document.createElement("canvas");
            canvas.width = MAP_W; canvas.height = MAP_H;
            const ctx = canvas.getContext("2d");
            const img = new Image();
            const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(svgBlob);
            img.onload = () => {
                ctx.fillStyle = "#f8fafc";
                ctx.fillRect(0, 0, MAP_W, MAP_H);
                ctx.drawImage(img, 0, 0);
                const link = document.createElement("a");
                link.download = "Ban_do_Sóc_Sơn_Official_Final.jpg";
                link.href = canvas.toDataURL("image/jpeg", 0.95);
                link.click();
                URL.revokeObjectURL(url);
                btnExport.innerHTML = originalHTML;
            };
            img.src = url;
        });

        window.addEventListener('load', autoFit);
        window.addEventListener('resize', autoFit);
    </script>
</body>
</html>
