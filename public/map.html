<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bản đồ Sóc Sơn - Đích đến số 3 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #f1f5f9;
            --paper: #ffffff;
            --ink: #0f172a;
            --muted: #475569;
            --border: rgba(15,23,42,.10);
            --emerald: #059669;
            --emerald2: #10b981;
            --blue: #2563eb;
            --shadow: 0 24px 80px rgba(0,0,0,.18);
            --asphalt: #475569; 
            --gold: #fbbf24;
            --red-luck: #ef4444;
        }
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: var(--bg); 
            color: var(--ink); 
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
        }
        
        header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 50;
            position: relative;
        }

        #viewport {
            position: relative;
            width: 100vw;
            height: calc(100vh - 72px);
            overflow: hidden;
            cursor: grab;
            background-color: #cbd5e1;
        }
        #viewport:active { cursor: grabbing; }
        #stage {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            background: white;
            box-shadow: var(--shadow);
            border-radius: 12px;
            border: 4px solid white;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.05); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.1; }
        }
        .animate-pulse-target { animation: pulse-ring 2.5s infinite ease-in-out; }

        @media (max-width: 1024px) {
            .qr-summary { display: none !important; }
        }
        @media (max-width: 768px) {
            .brand p { display: none; }
            .header-actions { gap: 4px; }
            .btn-text { display: none; }
        }
    </style>
</head>
<body>

    <header class="bg-white/90 backdrop-blur-md border-b border-slate-200 px-6 py-3 flex items-center justify-between z-50 shadow-sm">
        <div class="brand flex items-center gap-4">
            <div class="logo-wrap w-12 h-12 rounded-xl bg-white border border-slate-200 shadow-sm overflow-hidden flex items-center justify-center flex-shrink-0">
                <img
                    id="logo-img"
                    src="https://raw.githubusercontent.com/mimihoalua/mimihoalua/main/public/icons/icon-512.png"
                    alt="Logo"
                    class="w-full h-full object-cover"
                    onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'96\' height=\'96\'><rect width=\'96\' height=\'96\' rx=\'18\' fill=\'%232563eb\'/><text x=\'48\' y=\'58\' text-anchor=\'middle\' font-size=\'22\' font-weight=\'900\' fill=\'white\'>LOGO</text></svg>'"
                />
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tight uppercase m-0 leading-tight">Bản đồ Sóc Sơn — Đích đến số 3</h1>
                <p class="text-xs text-slate-500 m-0">Hạ tầng chuẩn • QL3 & QL131 căn giữa • Tuyến đỏ dẫn nhà số 3</p>
            </div>
        </div>

        <div class="header-actions flex items-center gap-3">
            <button onclick="autoFit()" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold shadow-sm hover:bg-slate-50 transition-all uppercase flex items-center gap-2">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                <span class="btn-text">Toàn cảnh</span>
            </button>

            <a href="https://maps.app.goo.gl/Jxi6tfa9Vn11gRWQ8" target="_blank" rel="noopener noreferrer" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2 uppercase">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6m4-3h6v6m-11 5L21 3"/></svg>
                <span class="btn-text">Google Maps</span>
            </a>

            <button 
                id="btnExport"
                onclick="exportToJpg()" 
                class="px-5 py-2 bg-emerald-600 text-white rounded-full text-xs font-black shadow-lg hover:bg-emerald-500 transition-all flex items-center gap-2 uppercase tracking-widest disabled:opacity-50"
            >
                <span id="export-text">Tải ảnh JPG</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5l5 5 5-5m-5 5V3"/></svg>
            </button>

            <div class="qr-summary flex items-center gap-3 bg-white/80 p-1 px-3 border border-slate-200 rounded-2xl shadow-sm ml-2 hidden md:flex">
                <div class="w-11 h-11 bg-white border border-slate-100 rounded-lg overflow-hidden flex-shrink-0">
                    <img 
                        src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https%3A%2F%2Fmaps.app.goo.gl%2FJxi6tfa9Vn11gRWQ8"
                        alt="QR"
                        class="w-full h-full p-1"
                    />
                </div>
                <div class="flex flex-col gap-1">
                    <span class="text-[10px] font-black uppercase text-slate-800 leading-none">Mở nhanh Maps</span>
                    <button onclick="copyLink()" id="btnCopy" class="text-[10px] font-bold text-blue-600 hover:text-blue-700 flex items-center gap-1 uppercase leading-none transition-colors">
                        <svg id="copy-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        <span id="copy-text">Copy link</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

                <g id="steps-layer">
                    <g transform="translate(970,500)">
                        <rect x="-65" y="-22" width="130" height="44" rx="22" fill="#fff" stroke="#ef4444" stroke-width="2"/>
                        <text text-anchor="middle" dominant-baseline="middle" font-weight="900" font-size="15" fill="#1e293b">B1 • TỪ NGÃ 4</text>
                    </g>
                    <g transform="translate(1040,270)">
                        <rect x="-95" y="-18" width="190" height="36" rx="18" fill="#fff" stroke="#ef4444" stroke-width="2"/>
                        <text text-anchor="middle" dominant-baseline="middle" font-weight="900" font-size="14" fill="#1e293b">B2 • RẼ NGÕ VĂN CHỈ</text>
                    </g>
                    <g transform="translate(1160,25)">
                        <rect x="-85" y="-25" width="170" height="50" rx="25" fill="#fff" stroke="#ef4444" stroke-width="2"/>
                        <text text-anchor="middle" dominant-baseline="middle" font-weight="900" font-size="15" fill="#1e293b">
                            <tspan x="0" dy="-7">B3 • TỚI NHÀ</tspan>
                            <tspan x="0" dy="20">SỐ 3</tspan>
                        </text>
                    </g>
                </g>
            </svg>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const stage = document.getElementById('stage');
        const svg = document.getElementById('mapSvg');
        const btnExport = document.getElementById('btnExport');
        const btnCopy = document.getElementById('btnCopy');
        const MAP_W = 3000, MAP_H = 2000;
        const MAPS_URL = "https://maps.app.goo.gl/Jxi6tfa9Vn11gRWQ8";
        
        let state = { x: 0, y: 0, scale: 0.35, dragging: false, lastX: 0, lastY: 0 };
        let touchStartDist = 0, touchStartScale = 1, lastTapTime = 0;

        function copyLink() {
            const el = document.createElement('textarea');
            el.value = MAPS_URL;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const textEl = document.getElementById('copy-text');
            const iconEl = document.getElementById('btnCopy');
            const originalText = textEl.innerText;
            textEl.innerText = "Đã Copy";
            iconEl.classList.remove('text-blue-600');
            iconEl.classList.add('text-emerald-600');
            setTimeout(() => {
                textEl.innerText = originalText;
                iconEl.classList.remove('text-emerald-600');
                iconEl.classList.add('text-blue-600');
            }, 2000);
        }

        function getTouchDist(e) {
            if (e.touches.length < 2) return 0;
            return Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }

        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                const now = Date.now();
                if (now - lastTapTime < 300) { handleDoubleTap(e.touches[0]); }
                lastTapTime = now;
                state.dragging = true;
                state.lastX = e.touches[0].clientX;
                state.lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                state.dragging = false;
                touchStartDist = getTouchDist(e);
                touchStartScale = state.scale;
            }
        }, { passive: true });

        viewport.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && state.dragging) {
                state.x += e.touches[0].clientX - state.lastX;
                state.y += e.touches[0].clientY - state.lastY;
                state.lastX = e.touches[0].clientX;
                state.lastY = e.touches[0].clientY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const dist = getTouchDist(e);
                if (dist === 0) return;
                const factor = dist / touchStartDist;
                const newScale = Math.max(0.05, Math.min(touchStartScale * factor, 4));
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const rect = viewport.getBoundingClientRect();
                state.x = (midX - rect.left) - ((midX - rect.left) - state.x) * (newScale / state.scale);
                state.y = (midY - rect.top) - ((midY - rect.top) - state.y) * (newScale / state.scale);
                state.scale = newScale;
                updateTransform();
            }
        }, { passive: true });

        viewport.addEventListener('touchend', () => { state.dragging = false; }, { passive: true });

        function handleDoubleTap(touch) {
            const rect = viewport.getBoundingClientRect();
            const newScale = Math.min(state.scale * 2, 4);
            state.x = (touch.clientX - rect.left) - ((touch.clientX - rect.left) - state.x) * (newScale / state.scale);
            state.y = (touch.clientY - rect.top) - ((touch.clientY - rect.top) - state.y) * (newScale / state.scale);
            state.scale = newScale;
            updateTransform();
        }

        viewport.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            state.dragging = true;
            state.lastX = e.clientX;
            state.lastY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!state.dragging) return;
            state.x += e.clientX - state.lastX;
            state.y += e.clientY - state.lastY;
            state.lastX = e.clientX;
            state.lastY = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => state.dragging = false);

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.1 : 0.9;
            const newScale = Math.max(0.05, Math.min(state.scale * factor, 4));
            const rect = viewport.getBoundingClientRect();
            state.x = (e.clientX - rect.left) - ((e.clientX - rect.left) - state.x) * (newScale / state.scale);
            state.y = (e.clientY - rect.top) - ((e.clientY - rect.top) - state.y) * (newScale / state.scale);
            state.scale = newScale;
            updateTransform();
        }, { passive: false });

        function autoFit() {
            const vRect = viewport.getBoundingClientRect();
            const scale = Math.min(vRect.width / MAP_W, vRect.height / MAP_H) * 0.95;
            state.scale = scale;
            state.x = (vRect.width - MAP_W * scale) / 2;
            state.y = (vRect.height - MAP_H * scale) / 2;
            updateTransform();
        }

        function updateTransform() {
            stage.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
        }

        function exportToJpg() {
            const textEl = document.getElementById('export-text');
            const originalText = textEl.innerText;
            textEl.innerText = "Đang xuất...";
            const svgData = new XMLSerializer().serializeToString(svg);
            const canvas = document.createElement("canvas");
            canvas.width = MAP_W; canvas.height = MAP_H;
            const ctx = canvas.getContext("2d");
            const img = new Image();
            const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(svgBlob);
            img.onload = () => {
                ctx.fillStyle = "#f8fafc";
                ctx.fillRect(0, 0, MAP_W, MAP_H);
                ctx.drawImage(img, 0, 0);
                const link = document.createElement("a");
                link.download = "Ban_do_Sóc_Sơn_Official_Final.jpg";
                link.href = canvas.toDataURL("image/jpeg", 0.95);
                link.click();
                URL.revokeObjectURL(url);
                textEl.innerText = originalText;
            };
            img.src = url;
        }

        window.addEventListener('load', autoFit);
        window.addEventListener('resize', autoFit);
    </script>
</body>
</html>
